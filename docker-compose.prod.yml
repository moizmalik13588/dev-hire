version: '3.8'

services:

  # PostgreSQL + PgBouncer (Connection Pooling)
  postgres:
    image: postgres:15-alpine
    container_name: devhire_postgres
    environment:
      POSTGRES_USER: devhire_user
      POSTGRES_PASSWORD: devhire_pass
      POSTGRES_DB: devhire_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devhire_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgBouncer — Connection Pooling
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: devhire_pgbouncer
    environment:
      DATABASE_URL: postgres://devhire_user:devhire_pass@postgres:5432/devhire_db
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000       # Max 1000 client connections
      DEFAULT_POOL_SIZE: 25       # 25 connections to PostgreSQL
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Redis
  redis:
    image: redis:7-alpine
    container_name: devhire_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend — Multiple instances
  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://devhire_user:devhire_pass@pgbouncer:5432/devhire_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GROQ_API_KEY: ${GROQ_API_KEY}
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: 3              # 3 backend instances
      resources:
        limits:
          memory: 512M

  # Nginx — Load Balancer
  nginx:
    image: nginx:alpine
    container_name: devhire_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
